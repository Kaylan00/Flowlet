services:
  postgres:
    image: postgres:16-alpine
    container_name: flowlet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowlet
      POSTGRES_PASSWORD: flowlet
      POSTGRES_DB: flowlet
    ports:
      - "5432:5432"
    volumes:
      - flowlet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowlet -d flowlet"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  flowlet_pgdata:
