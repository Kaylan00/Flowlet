<aside class="sidebar" [class.expanded]="layout.sidebarExpanded()">

  <a class="sidebar-brand" routerLink="/dashboard">
    <div class="brand-icon">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="#4f46e5"/>
        <path d="M8 10h4v2H8v-2zm0 6h4v2H8v-2zm8-6h4v2h-4v-2zm0 6h4v2h-4v-2zm-4 0h4v-6h-4v6z" fill="white" opacity="0.9"/>
      </svg>
    </div>
    <span class="brand-name">Flowlet</span>
  </a>

  <nav class="sidebar-nav">
    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="nav-item" title="Dashboard">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path d="M3 4a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm8 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V4zM3 12a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1v-4zm8 0a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/>
        </svg>
      </span>
      <span class="nav-label">Dashboard</span>
    </a>

    <a routerLink="/credentials" routerLinkActive="active" class="nav-item" title="Credenciais">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/>
        </svg>
      </span>
      <span class="nav-label">Credenciais</span>
    </a>

    <button class="nav-item" (click)="goToTemplates()" title="Templates">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z"/>
        </svg>
      </span>
      <span class="nav-label">Templates</span>
    </button>
  </nav>

  <div class="sidebar-spacer"></div>

  <div class="sidebar-footer">
    <button class="nav-item" (click)="showHelp.set(true)" title="Ajuda">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z"/>
        </svg>
      </span>
      <span class="nav-label">Ajuda</span>
    </button>

    <button class="nav-item profile-btn" (click)="showProfile.set(true)" [title]="auth.currentUser()?.name || 'Perfil'">
      <span class="nav-icon">
        <div class="user-avatar">{{ auth.currentUser()?.avatar }}</div>
      </span>
      <span class="nav-label nav-profile-info">
        <span class="profile-name">{{ auth.currentUser()?.name }}</span>
        <span class="profile-email">{{ auth.currentUser()?.email }}</span>
      </span>
    </button>

    <div class="sidebar-divider"></div>

    <button class="nav-item collapse-btn" (click)="layout.toggle()" [title]="layout.sidebarExpanded() ? 'Recolher' : 'Expandir'">
      <span class="nav-icon">
        @if (layout.sidebarExpanded()) {
          <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"/>
          </svg>
        } @else {
          <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"/>
          </svg>
        }
      </span>
      <span class="nav-label">Recolher</span>
    </button>
  </div>
</aside>

@if (showHelp()) {
  <div class="sb-modal-backdrop" (click)="showHelp.set(false)">
    <div class="sb-modal" (click)="$event.stopPropagation()">
      <div class="sb-modal-header">
        <h2>Ajuda — Perguntas Frequentes</h2>
        <button class="btn-close" (click)="showHelp.set(false)">
          <svg width="16" height="16" viewBox="0 0 14 14" fill="currentColor"><path d="M4.05 3.05a.75.75 0 00-1.06 1.06L5.94 7l-2.95 2.89a.75.75 0 101.06 1.06L7 8.06l2.89 2.89a.75.75 0 101.06-1.06L8.06 7l2.89-2.89a.75.75 0 00-1.06-1.06L7 5.94 4.05 3.05z"/></svg>
        </button>
      </div>
      <div class="sb-modal-body faq-body">
        @for (faq of faqs; track faq.q) {
          <div class="faq-item">
            <div class="faq-q">{{ faq.q }}</div>
            <div class="faq-a">{{ faq.a }}</div>
          </div>
        }
      </div>
    </div>
  </div>
}

@if (showProfile()) {
  <div class="sb-modal-backdrop" (click)="showProfile.set(false)">
    <div class="sb-modal profile-modal" (click)="$event.stopPropagation()">
      <div class="sb-modal-header">
        <h2>Meu Perfil</h2>
        <button class="btn-close" (click)="showProfile.set(false)">
          <svg width="16" height="16" viewBox="0 0 14 14" fill="currentColor"><path d="M4.05 3.05a.75.75 0 00-1.06 1.06L5.94 7l-2.95 2.89a.75.75 0 101.06 1.06L7 8.06l2.89 2.89a.75.75 0 101.06-1.06L8.06 7l2.89-2.89a.75.75 0 00-1.06-1.06L7 5.94 4.05 3.05z"/></svg>
        </button>
      </div>
      <div class="sb-modal-body profile-body">
        <div class="profile-avatar-lg">{{ auth.currentUser()?.avatar }}</div>
        <div class="profile-details">
          <div class="profile-detail-name">{{ auth.currentUser()?.name }}</div>
          <div class="profile-detail-email">{{ auth.currentUser()?.email }}</div>
        </div>
        <div class="profile-settings">
          <div class="settings-row">
            <span class="settings-label">Tema</span>
            <button class="theme-toggle-btn" (click)="theme.toggle()">
              @if (theme.isDark()) {
                <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
                Claro
              } @else {
                <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
                Escuro
              }
            </button>
          </div>
          <div class="settings-row">
            <span class="settings-label">Idioma</span>
            <div class="lang-toggle">
              <button class="lang-btn" [class.active]="i18n.lang() === 'en'" (click)="i18n.setLang('en')">EN</button>
              <button class="lang-btn" [class.active]="i18n.lang() === 'pt'" (click)="i18n.setLang('pt')">PT</button>
            </div>
          </div>
        </div>
      </div>
      <div class="sb-modal-footer">
        <button class="btn-logout" (click)="auth.logout(); showProfile.set(false)">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z"/></svg>
          Sair da conta
        </button>
      </div>
    </div>
  </div>
}
